name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  windows:
    name: Build Windows application
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.28"
          python-version: "3.12"
          enable-cache: true
      - name: Install project
        run: uv sync --locked --dev
      - name: Check tag version
        shell: pwsh
        run: |
          $expected = uv run python -c "import quickterm; print('v' + quickterm.__version__)"
          if ($expected -ne $env:GITHUB_REF_NAME) {
            throw "Tag $env:GITHUB_REF_NAME does not match package version $expected"
          }
      - name: Verify
        run: |
          uv run ruff check quickterm tests
          uv run pytest -q
      - name: Build executable
        run: uv run pyinstaller --noconfirm --clean quickterm.spec
      - name: Build installer and portable archive
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart('v')
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) {
            choco install innosetup --no-progress --yes
          }
          if (!(Test-Path $iscc)) {
            throw "Inno Setup compiler was not found at $iscc"
          }
          & $iscc "/DAppVersion=$version" "packaging\quickterm.iss"
          $archive = "QuickTerm-$env:GITHUB_REF_NAME-windows-x64.zip"
          Compress-Archive -Path "dist/QuickTerm.exe", "README.md", "LICENSE" -DestinationPath $archive
      - name: Build Python distributions
        run: uv build --no-sources
      - name: Create checksums
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart('v')
          $archive = "QuickTerm-$env:GITHUB_REF_NAME-windows-x64.zip"
          $files = @(
            $archive,
            "dist/QuickTerm-v$version-Setup.exe"
          )
          $files += Get-ChildItem "dist/*.whl", "dist/*.tar.gz" | ForEach-Object { $_.FullName }
          $lines = foreach ($file in $files) {
            $hash = (Get-FileHash $file -Algorithm SHA256).Hash.ToLower()
            "$hash  $([IO.Path]::GetFileName($file))"
          }
          $lines | Set-Content "SHA256SUMS.txt"
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $archive = "QuickTerm-$env:GITHUB_REF_NAME-windows-x64.zip"
          $version = $env:GITHUB_REF_NAME.TrimStart('v')
          $assets = @($archive, "dist/QuickTerm-v$version-Setup.exe", "SHA256SUMS.txt")
          $assets += Get-ChildItem "dist/*.whl", "dist/*.tar.gz" | ForEach-Object { $_.FullName }
          gh release create $env:GITHUB_REF_NAME @assets --verify-tag --generate-notes --title "QuickTerm $env:GITHUB_REF_NAME"
