name: Bug report
description: Tell us what broke and how to reproduce it.
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Include the terminal type and the smallest reproduction you can.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: QuickTerm version
      placeholder: v0.1.0
    validations:
      required: true
  - type: input
    id: system
    attributes:
      label: Operating system
      placeholder: Windows 11 24H2
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Logs live under %APPDATA%/quickterm/logs. Remove secrets before pasting.
      render: text
