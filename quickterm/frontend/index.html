<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QuickTerm</title>
<link rel="icon" type="image/png" sizes="32x32" href="/assets/icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/assets/icon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/assets/icon-180.png">
<link rel="stylesheet" href="/vendor/xterm.css">
<link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div id="app">
  <header id="launcher" class="launcher"></header>
  <main id="grid" class="grid" aria-label="Terminal workspace"></main>
  <div id="zoom-host" class="zoom-host" hidden></div>
  <footer id="statusbar" class="statusbar">
    <span id="sb-workspace" class="sb-item"></span>
    <span class="sb-sep">&middot;</span>
    <span id="sb-sessions" class="sb-item"></span>
    <span id="sb-zoom">zoom</span>
    <span class="sb-flex"></span>
    <button id="sb-shortcuts" type="button">Commands <kbd>Alt+K</kbd></button>
    <span id="voice-indicator"></span>
    <span id="sb-clock" class="sb-item"></span>
  </footer>
  <div id="live-status" class="sr-only" role="status" aria-live="polite"></div>
</div>
<script src="/vendor/xterm.js"></script>
<script src="/vendor/addon-fit.js"></script>
<script src="/vendor/addon-webgl.js"></script>
<script src="/vendor/addon-web-links.js"></script>
<script src="/vendor/addon-unicode11.js"></script>
<script type="module" src="/js/main.js"></script>
</body>
</html>
